<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery – Anika's Homemade Cake Studio | Custom Eggless Cakes Pune</title>
  <meta name="description" content="Browse our gallery of custom eggless cakes – birthday cakes, anniversary cakes, theme cakes and more. Made fresh in Ravet, Pune." />
  <meta property="og:title" content="Gallery – Anika's Homemade Cake Studio" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>

  <!-- ── PAGE HERO ─────────────────────────────────────────────── -->
  <section class="hero-gradient py-20 text-center">
    <p class="section-subtitle mb-2">Our Creations</p>
    <h1 class="section-title text-5xl">Gallery</h1>
    <hr class="divider-rose" />
    <p class="text-gray-500 mt-4 max-w-md mx-auto px-4">Every cake tells a story. Browse our collection and find your inspiration.</p>
  </section>

  <!-- ── GALLERY SECTION ────────────────────────────────────────── -->
  <section class="py-12 bg-white">
    <div class="max-w-6xl mx-auto px-4">

      <!-- Filter buttons -->
      <div class="flex gap-3 justify-center mb-8">
        <button class="gallery-filter-btn active-filter bg-deeprose text-white border border-deeprose px-5 py-2 rounded-full text-sm font-semibold transition" data-filter="all">All</button>
        <button class="gallery-filter-btn border border-rose-200 text-deeprose px-5 py-2 rounded-full text-sm font-semibold hover:bg-rose-50 transition" data-filter="image">Photos</button>
        <button class="gallery-filter-btn border border-rose-200 text-deeprose px-5 py-2 rounded-full text-sm font-semibold hover:bg-rose-50 transition" data-filter="video">Videos</button>
      </div>

      <!-- Loading state -->
      <div id="gallery-loading" class="text-center py-20 text-gray-400">
        <div class="text-5xl mb-4">🎂</div>
        <p>Loading gallery…</p>
      </div>

      <!-- Empty state -->
      <div id="gallery-empty" class="text-center py-20 text-gray-400 hidden">
        <div class="text-5xl mb-4">📸</div>
        <p>No photos yet. Check back soon!</p>
      </div>

      <!-- Grid -->
      <div id="gallery-grid" class="gallery-grid hidden"></div>
    </div>
  </section>

  <!-- ── ORDER CTA ──────────────────────────────────────────────── -->
  <section class="py-12 bg-cream text-center">
    <p class="font-dancing text-xl text-deeprose mb-2">Love what you see?</p>
    <h2 class="font-cormorant text-3xl font-semibold text-choco mb-4">Order Your Custom Cake</h2>
    <a href="/src/pages/contact.html" class="btn-primary inline-block">Place an Order 🎂</a>
  </section>

  <!-- ── LIGHTBOX ───────────────────────────────────────────────── -->
  <div id="lightbox" class="fixed inset-0 bg-black/90 z-[950] hidden flex items-center justify-center p-4">
    <button id="lightbox-close" class="absolute top-4 right-4 text-white text-4xl hover:text-blush transition leading-none">✕</button>
    <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[85vh] rounded-xl object-contain shadow-2xl" />
    <video id="lightbox-video" src="" controls class="max-w-full max-h-[85vh] rounded-xl hidden"></video>
    <p id="lightbox-caption" class="absolute bottom-6 text-white/70 text-sm text-center w-full px-4"></p>
  </div>

  <script type="module">
    import { renderNavbar } from '/src/js/components/navbar.js';
    import { renderFooter } from '/src/js/components/footer.js';
    import '/src/js/gallery.js';
    renderNavbar();
    renderFooter();
  </script>
</body>
</html>
